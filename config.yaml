polynomial_degree: 10
max_root_magnitude: 3
logs_path: logs/
training:
  model_type: mlp
  input_data_path: training-data/
  randomly_distributed_zeroes: 30_000
  repeated_distributed_zeroes: 200
  uniformly_distributed_zeroes: 10_000
  output_model_path: model-output/
  epochs_count: 100
  early_stop_epochs: 17
  batch_size: 4096
  hidden_size: 256
  layers_count: 3
  start_learning_rate: 0.01
evaluation:
  test_data_path: test-data/
  dk_circle_radius: 50
  dk_tolerance: 0.01
  dk_max_iterations: 1000

